<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>Մալխաս Ամոյան</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1 class="title">Մալխաս Ամոյան</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/3/37/Malkhas_Amoyan.jpg" width="300">

<h2>Կենսագրություն</h2>
<p>Հայ ըմբիշ, աշխարհի և Եվրոպայի չեմպիոն։</p>

<h2>Մարզումների գրաֆիկ</h2>
<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"), {
type: "bar",
data: {
labels: ["Երկ","Երք","Չոր","Հնգ","Ուրբ"],
datasets: [{ label: "Ժամեր", data: [3,5,4,5,4] }]
}
});
</script>

<br><br>
<button onclick="location.href='index.html'">Վերադառնալ</button>

</body>
</html>
