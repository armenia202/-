<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>Լևոն Արոնյան</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1 class="title">Լևոն Արոնյան</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/7/74/Levon_Aronian_2013.jpg" width="300">

<h2>Կենսագրություն</h2>
<p>Հայ գրոսմայստեր, աշխարհի ուժեղագույն շախմատիստներից մեկը։</p>

<h2>Մարզումների գրաֆիկ</h2>
<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"), {
type: "bar",
data: {
labels: ["Երկ","Երք","Չոր","Հնգ","Ուրբ"],
datasets: [{ label: "Ժամեր", data: [2,3,4,3,2] }]
}
});
</script>

<br><br>
<button onclick="location.href='index.html'">Վերադառնալ</button>

</body>
</html>
