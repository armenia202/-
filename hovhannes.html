<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>Հովհաննես Բաչկով</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1 class="title">Հովհաննես Բաչկով</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/1/15/Hovhannes_Bachkov.jpg"
style="width:300px; border-radius:20px; box-shadow:0 5px 20px rgba(0,0,0,0.5);">

<h2>Կենսագրություն</h2>
<p>Հայ բռնցքամարտիկ, միջազգային մրցաշարերի հաղթող։</p>
<h2>🏅 Նվաճումներ</h2>
<ul style="list-style:none; padding:0; font-size:18px;">
<li>🥇 Օլիմպիական մեդալակիր</li>
<li>🥇 Աշխարհի չեմպիոն</li>
<li>🥇 Եվրոպայի չեմպիոն</li>
</ul>

<h2>Մարզումների գրաֆիկ</h2>
<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"), {
type: "bar",
data: {
labels: ["Երկ","Երք","Չոր","Հնգ","Ուրբ"],
datasets: [{
label: "Մարզման ժամեր",
data: [...],
backgroundColor: "#C8102E"
}]
}
});
</script>

<br><br>
<button onclick="location.href='index.html'">Վերադառնալ</button>

</body>
</html>
