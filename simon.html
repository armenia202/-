<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<title>Սիմոն Մարտիրոսյան</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h1 class="title">Սիմոն Մարտիրոսյան</h1>

<img src="https://upload.wikimedia.org/wikipedia/commons/5/5c/Simon_Martirosyan.jpg" width="300">

<h2>Կենսագրություն</h2>
<p>Հայ ծանրամարտիկ, Օլիմպիական խաղերի մեդալակիր և աշխարհի չեմպիոն։</p>

<h2>Մարզումների գրաֆիկ</h2>
<canvas id="chart"></canvas>

<script>
new Chart(document.getElementById("chart"), {
type: "bar",
data: {
labels: ["Երկ","Երք","Չոր","Հնգ","Ուրբ"],
datasets: [{ label: "Ժամեր", data: [4,5,4,6,5] }]
}
});
</script>

<br><br>
<button onclick="location.href='index.html'">Վերադառնալ</button>

</body>
</html>
